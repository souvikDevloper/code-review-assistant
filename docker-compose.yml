

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - ./models/codet5-lora:/app/model

  frontend:
    build:
      context: ./frontend          # ← use the "frontend/" folder as the build context
      dockerfile: Dockerfile       # ← Dockerfile lives at "frontend/Dockerfile"
    ports:
      - "3000:80"
